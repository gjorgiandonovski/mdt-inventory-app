name: mdt
description: MDT Inventory App
publish_to: "none"

version: 1.0.0+1

environment:
    sdk: ">=3.0.0 <4.0.0"

dependencies:
    flutter:
        sdk: flutter

    provider: ^6.1.2

    shared_preferences: ^2.2.2

    mobile_scanner: ^7.1.4
    image_picker: ^1.1.2
    path_provider: ^2.1.4
    share_plus: ^12.0.1
    csv: ^6.0.0
    firebase_core: ^4.4.0
    firebase_auth: ^6.1.4
    cloud_firestore: ^6.1.2
    firebase_storage: ^13.0.6
    http: ^1.2.2
    excel: ^4.0.5

dev_dependencies:
    flutter_launcher_icons: ^0.14.4

flutter:
    uses-material-design: true
    assets:
        - assets/mdt.png

flutter_launcher_icons:
    android: true
    ios: true
    remove_alpha_ios: true
    image_path: "assets/mdt.png"
